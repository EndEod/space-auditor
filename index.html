<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Auditor - 프로젝트 진단</title>
<style>
    :root {
        --primary-color: #2c3e50;
        --hover-color: #34495e;
        --bg-color: #f8f9fa;
        --box-bg: #ffffff;
        --text-color: #333333;
    }

    body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    .auditor-container {
        background-color: var(--box-bg);
        width: 100%;
        max-width: 600px;
        padding: 50px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        text-align: center;
    }

    h1 {
        font-size: 1.2rem;
        color: #7f8c8d;
        margin-bottom: 10px;
        font-weight: 500;
        letter-spacing: 2px;
    }

    #question-text {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 40px;
        line-height: 1.4;
        word-break: keep-all;
    }

    .options-grid {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .option-btn {
        background-color: var(--box-bg);
        border: 2px solid #e0e0e0;
        color: var(--text-color);
        padding: 18px 20px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        word-break: keep-all;
    }

    .option-btn:hover {
        border-color: var(--primary-color);
        background-color: var(--primary-color);
        color: #ffffff;
    }

    .restart-btn {
        margin-top: 30px;
        background-color: transparent;
        border: none;
        color: #95a5a6;
        text-decoration: underline;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .restart-btn:hover {
        color: var(--primary-color);
    }

    /* 페이드 인 애니메이션 */
    .fade-in {
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="auditor-container fade-in" id="quiz-box">
    <h1>SPACE AUDITOR</h1>
    <div id="question-text">질문을 불러오는 중입니다...</div>
    <div class="options-grid" id="options-container">
        </div>
    <button class="restart-btn" id="restart-btn" style="display: none;" onclick="startAuditor()">처음부터 다시하기</button>
</div>

<script>
    // 도식화하신 흐름을 반영한 데이터 구조입니다.
    // 이 부분의 텍스트와 next(다음 이동할 노드 이름)를 수정하여 마음대로 확장하실 수 있습니다.
    const treeData = {
        "start": {
            question: "어떤 건축물을 검토하고 계신가요?",
            options: [
                { text: "주택", next: "house_type" },
                { text: "비주택", next: "non_house" },
                { text: "위반건축물", next: "reject" }
            ]
        },
        "house_type": {
            question: "주택의 종류를 선택해주세요.",
            options: [
                { text: "공동주택 (다세대, 연립, 아파트 등)", next: "multi_family" },
                { text: "단독주택 (단독, 다가구)", next: "single_family_type" },
                { text: "근생주택", next: "reject" }
            ]
        },
        "multi_family": {
            question: "다세대 주택의 면적은 어떻게 되나요?",
            options: [
                { text: "85㎡ 미만", next: "success" },
                { text: "85㎡ 이상", next: "reject" }
            ]
        },
        "single_family_type": {
            question: "단독주택의 세부 유형을 선택해주세요.",
            options: [
                { text: "단독주택", next: "single_size" },
                { text: "다가구주택", next: "dagagu_size" }
            ]
        },
        "single_size": {
            question: "단독주택의 면적은 어떻게 되나요?",
            options: [
                { text: "165㎡ 이하", next: "success" },
                { text: "165㎡ 이상", next: "reject" }
            ]
        },
        "dagagu_size": {
            question: "다가구주택의 면적은 어떻게 되나요?",
            options: [
                { text: "330㎡ 이하", next: "success" },
                { text: "660㎡ 이하", next: "success" } // 필요에 따라 분기 변경 가능
            ]
        },
        "non_house": {
            question: "비주택 관련 서비스는 준비 중이거나 별도 문의가 필요합니다.",
            options: [
                { text: "별도 문의하기", next: "success" }
            ]
        },
        "reject": {
            question: "안타깝지만 스페이스 오디터 서비스 대상에 해당되지 않습니다.",
            options: [] // 옵션이 없으면 여기서 흐름이 종료됩니다.
        },
        "success": {
            question: "스페이스 오디터 서비스 진행이 가능합니다! 다음 단계로 이동합니다.",
            options: [
                { text: "상담 신청하기 / 다음 단계로", next: "redirect_to_form" }
            ]
        }
    };

    const questionEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const restartBtn = document.getElementById('restart-btn');
    const quizBox = document.getElementById('quiz-box');

    // 렌더링 함수
    function renderNode(nodeId) {
        // 애니메이션 효과를 위해 클래스 제거 후 재추가
        quizBox.classList.remove('fade-in');
        void quizBox.offsetWidth; // 트리거 리플로우
        quizBox.classList.add('fade-in');

        const node = treeData[nodeId];
        
        // 커스텀 리다이렉트 (예: 성공 후 특정 페이지로 넘길 때)
        if (nodeId === "redirect_to_form") {
            alert("여기서 실제 신청 페이지나 다음 폼으로 넘어가게 연결됩니다.");
            // window.location.href = "https://space-auditor.com/apply"; 
            return;
        }

        questionEl.innerText = node.question;
        optionsContainer.innerHTML = '';

        if (node.options.length > 0) {
            node.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => renderNode(opt.next);
                optionsContainer.appendChild(btn);
            });
            restartBtn.style.display = (nodeId === 'start') ? 'none' : 'inline-block';
        } else {
            // 선택지가 없는 끝단 (예: 거절 화면)
            restartBtn.style.display = 'inline-block';
        }
    }

    // 초기화 함수
    function startAuditor() {
        renderNode('start');
    }

    // 첫 시작
    startAuditor();
</script>

</body>
</html>
