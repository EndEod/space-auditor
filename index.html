<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Auditor - 프로젝트 진단</title>
<style>
    :root {
        --primary-color: #2c3e50;
        --hover-color: #34495e;
        --bg-color: #f8f9fa;
        --box-bg: #ffffff;
        --text-color: #333333;
    }

    body {
        font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
    }

    .auditor-container {
        background-color: var(--box-bg);
        width: 100%;
        max-width: 600px;
        padding: 50px 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        text-align: center;
    }

    h1 {
        font-size: 1.2rem;
        color: #7f8c8d;
        margin-bottom: 10px;
        font-weight: 500;
        letter-spacing: 2px;
    }

    #question-text {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 40px;
        line-height: 1.4;
        word-break: keep-all;
        white-space: pre-wrap;
    }

    .options-grid {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .option-btn {
        background-color: var(--box-bg);
        border: 2px solid #e0e0e0;
        color: var(--text-color);
        padding: 18px 20px;
        font-size: 1.1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        word-break: keep-all;
    }

    .option-btn:hover {
        border-color: var(--primary-color);
        background-color: var(--primary-color);
        color: #ffffff;
    }

    .input-field {
        padding: 15px;
        font-size: 1rem;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 10px;
    }

    .input-field:focus {
        border-color: var(--primary-color);
    }

    .restart-btn {
        margin-top: 30px;
        background-color: transparent;
        border: none;
        color: #95a5a6;
        text-decoration: underline;
        cursor: pointer;
        font-size: 0.9rem;
    }

    .restart-btn:hover {
        color: var(--primary-color);
    }

    .fade-in {
        animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="auditor-container fade-in" id="quiz-box">
    <h1>SPACE AUDITOR</h1>
    <div id="question-text">질문을 불러오는 중입니다...</div>
    <div class="options-grid" id="options-container"></div>
    <button class="restart-btn" id="restart-btn" style="display: none;" onclick="startAuditor()">처음부터 다시하기</button>
</div>

<script>
    const treeData = {
        "start": {
            question: "어떤 건축물을 검토하고 계신가요?",
            options: [
                { text: "주택", next: "reject_general" },
                { text: "비주택", next: "reject_general" },
                { text: "위반건축물", next: "violation_type" }
            ]
        },
        "reject_general": {
            question: "현재 스페이스 오디터는 위반건축물 양성화 대상을 우선적으로 지원하고 있습니다.\n일반 건축물 상담은 별도 문의 부탁드립니다.",
            options: [
                { text: "이름, 연락처 남기고 문의하기", next: "input_form" }
            ]
        },
        "violation_type": {
            question: "위반건축물의 유형을 선택해주세요.",
            options: [
                { text: "특정건축물 정리에 관한 특별조치법 (특정법)", next: "house_category" },
                { text: "그 외 (일반)", next: "violation_other" }
            ]
        },
        "violation_other": {
            question: "건축물의 용도를 선택해주세요.",
            options: [
                { text: "주택", next: "reject" },
                { text: "비주택", next: "reject" }
            ]
        },
        "house_category": {
            question: "대상 주택의 종류를 선택해주세요.",
            options: [
                { text: "공동주택 (다세대, 연립, 아파트 등)", next: "multi_family" },
                { text: "단독주택 (단독, 다가구)", next: "single_family_type" },
                { text: "근생주택", next: "reject" }
            ]
        },
        "multi_family": {
            question: "다세대 주택의 면적은 어떻게 되나요?",
            options: [
                { text: "85㎡ 미만", next: "cta_report" },
                { text: "85㎡ 이상", next: "reject" }
            ]
        },
        "single_family_type": {
            question: "단독주택의 세부 유형을 선택해주세요.",
            options: [
                { text: "단독주택", next: "single_size" },
                { text: "다가구주택", next: "dagagu_size" }
            ]
        },
        "single_size": {
            question: "단독주택의 면적은 어떻게 되나요?",
            options: [
                { text: "165㎡ 이하", next: "cta_report" },
                { text: "165㎡ 이상", next: "reject" }
            ]
        },
        "dagagu_size": {
            question: "다가구주택의 면적은 어떻게 되나요?",
            options: [
                { text: "330㎡ 이하", next: "cta_report" },
                { text: "660㎡ 이하", next: "cta_report" }
            ]
        },
        "reject": {
            question: "안타깝지만 해당 조건은 스페이스 오디터 서비스 대상에 해당되지 않습니다.",
            options: []
        },
        "cta_report": {
            question: "진단 결과, 서비스 진행이 가능합니다!\n이 내용의 유료 리포트를 사용하시겠습니까?",
            options: [
                { text: "네", next: "cta_pay" },
                { text: "아니오", next: "cta_contact_ask" }
            ]
        },
        "cta_pay": {
            question: "결제를 진행하시겠습니까?",
            options: [
                { text: "네", next: "cta_contact_ask" },
                { text: "아니오", next: "cta_contact_ask" }
            ]
        },
        "cta_contact_ask": {
            question: "전문가 검토를 위해 이름과 연락처를 남기시겠습니까?",
            options: [
                { text: "네", next: "input_form" },
                { text: "아니오", next: "end_bye" }
            ]
        },
        "end_bye": {
            question: "감사합니다. 스페이스 오디터였습니다.",
            options: []
        }
    };

    const questionEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const restartBtn = document.getElementById('restart-btn');
    const quizBox = document.getElementById('quiz-box');

    function renderNode(nodeId) {
        quizBox.classList.remove('fade-in');
        void quizBox.offsetWidth;
        quizBox.classList.add('fade-in');

        if (nodeId === "input_form") {
            questionEl.innerText = "연락처를 남겨주시면 빠르게 검토 후 연락드리겠습니다.";
            optionsContainer.innerHTML = `
                <input type="text" id="user-name" class="input-field" placeholder="성함을 입력해주세요">
                <input type="tel" id="user-phone" class="input-field" placeholder="연락처 (010-0000-0000)">
                <button class="option-btn" style="background-color: var(--primary-color); color: #ffffff;" onclick="submitForm()">신청 완료하기</button>
            `;
            restartBtn.style.display = 'inline-block';
            return;
        }

        const node = treeData[nodeId];
        questionEl.innerText = node.question;
        optionsContainer.innerHTML = '';

        if (node.options.length > 0) {
            node.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => renderNode(opt.next);
                optionsContainer.appendChild(btn);
            });
            restartBtn.style.display = (nodeId === 'start') ? 'none' : 'inline-block';
        } else {
            restartBtn.style.display = 'inline-block';
        }
    }

    function submitForm() {
        const name = document.getElementById('user-name').value;
        const phone = document.getElementById('user-phone').value;
        if (!name || !phone) {
            alert("이름과 연락처를 모두 입력해주세요.");
            return;
        }
        alert(`${name}님, 접수가 완료되었습니다.`);
        renderNode('end_bye');
    }

    function startAuditor() { renderNode('start'); }
    startAuditor();
</script>
</body>
</html>
